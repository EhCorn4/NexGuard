[project]
name = "nexguard-discord-bot"
version = "1.0.0"
description = "NexGuard Discord Bot - Advanced moderation and management bot"
requires-python = ">=3.11"
dependencies = [
    "aiohttp>=3.12.13",
    "discord-py>=2.5.2",
    "flask-wtf>=1.2.2",
    "flask>=3.1.1",
    "flask-cors>=6.0.1",
    "flask-socketio>=5.5.1",
    "openai>=1.94.0",
    "python-dotenv>=1.1.1",
    "psycopg2-binary>=2.9.10",
    "flask-admin>=1.6.1",
    "requests>=2.32.4",
    "flask-sqlalchemy>=3.1.1",
    "flask-migrate>=4.1.0",
    "bootstrap-flask>=2.5.0",
    "flask-login>=0.6.3",
    "wtforms>=3.2.1",
]

[project.scripts]
nexguard = "nexguard.index:main"

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>NexGuard - Professional Discord Bot</title>
    
    <!-- PWA Support -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icon-192.svg" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="NexGuard" />
    
    <!-- SEO Optimization -->
    <meta name="description" content="NexGuard - Professional Discord bot with advanced moderation, ticket system, analytics, and comprehensive server management. Protecting 205+ users across 11+ servers." />
    <meta name="keywords" content="discord bot, moderation bot, discord moderation, server management, discord utilities, ticket system, automod, discord analytics" />
    <meta name="author" content="NexGuard Team" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph -->
    <meta property="og:title" content="NexGuard - Professional Discord Bot" />
    <meta property="og:description" content="Advanced Discord moderation and management bot with comprehensive features including tickets, automod, and analytics." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icon-512.svg" />
    
    <!-- Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="prefetch" href="/api/bot/status" />
    <link rel="prefetch" href="/api/features" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- This is a replit script which adds a banner on the top of the page when opened in development mode outside the replit environment -->
    <script type="text/javascript" src="https://replit.com/public/js/replit-dev-banner.js"></script>
  </body>
</html>
